{% extends "base.html" %}

{% block title %}Add Habit – Habit Ledger{% endblock %}

{% block content %}
  <div class="wrap">
    <header>
      <h1>Add a New Habit</h1>
      <p class="sub">Create a habit to track in your weekly ledger.</p>
      <nav class="page-nav">
        <a href="{{ url_for('index_page') }}" class="ghost">Dashboard</a>
        <a href="{{ url_for('habit_form_page') }}" class="ghost">Add Habit</a>
      </nav>
    </header>

    <form id="habit-form" class="habit-form">
      <label for="habit-name">Habit name</label>
      <input
        type="text"
        id="habit-name"
        name="habit-name"
        placeholder="e.g. Read 20 minutes"
        required
        maxlength="40"
      />

      <div class="form-actions">
        <button type="submit">Save Habit</button>
        <a href="{{ url_for('index_page') }}" class="ghost">Cancel</a>
      </div>
    </form>
  </div>

  <!-- Load form-specific JS -->
  <script src="{{ url_for('static', filename='app_form.js') }}"></script>
{% endblock %}
