<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

  <h1>Habit Tracker</h1>

  <form id="add-form">
    <input id="habit-input" type="text" placeholder="New habit…" autocomplete="off">
    <button type="submit">Add</button>
  </form>

  <button id="undo-btn" disabled>Undo remove</button>
  <button id="new-week-btn">Start New Week</button>

  <table>
    <thead>
      <tr>
        <th>Habit</th>
        <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tracker-body"></tbody>
  </table>

  <div id="patterns"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
