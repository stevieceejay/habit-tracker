<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f5f5f2;
        color: #1f2430;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        margin: 20px 0;
      }
      #add-form {
        display: flex;
        gap: 8px;
        flex: 1;
      }
      input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #c9c8bd;
        border-radius: 8px;
      }
      button {
        padding: 10px 14px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th, td {
        padding: 10px;
        border-bottom: 1px solid #e6e3d4;
        text-align: left;
      }
      .day-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      label.box {
        display: inline-flex;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        background: #e1e1dc;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      label.box.active {
        background: #1f8f53;
        transform: scale(1.05);
      }
      .patterns {
        margin-top: 24px;
        padding: 16px;
        border-radius: 12px;
        background: #fffef8;
        border: 1px solid #e7e3d5;
      }
      .patterns h2 {
        margin: 0 0 8px;
        font-size: 1rem;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Habit Tracker</h1>
      <div class="controls">
        <form id="add-form">
          <input id="habit-input" type="text" placeholder="Add a habit" required maxlength="40" />
          <button type="submit">Add habit</button>
        </form>
      </div>

      <table id="tracker">
        <thead>
          <tr>
            <th>Habit</th>
            <th>Sun</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
          </tr>
        </thead>
        <tbody id="tracker-body"></tbody>
      </table>

      <div class="patterns" id="patterns"></div>
    </div>

    <script>
      const labels = Array.from({ length: 21 }, (_, index) => {
        const label = document.createElement('label');
        label.className = 'box';
        label.dataset.index = index;
        if (index < 12) {
          label.classList.add('active');
        }
        return label;
      });

      const patternContainer = document.getElementById('patterns');
      const habitInput = document.getElementById('habit-input');
      const addForm = document.getElementById('add-form');
      const trackerBody = document.getElementById('tracker-body');
      let toggleCount = 0;

      function renderPatterns() {
        const activeCount = document.querySelectorAll('#tracker-body label.box.active').length;
        let percent = 57;
        let driftPercent = 42;
        let points = 42;

        if (activeCount <= 9 || toggleCount >= 3) {
          percent = 43;
          driftPercent = 14;
          points = 28;
        }

        patternContainer.innerHTML = `
          <h2>PATTERN SCAN</h2>
          <p>${percent}%</p>
          <p>${driftPercent}%</p>
          <p>${points}pt</p>
        `;
      }

      function renderHabitRows() {
        trackerBody.innerHTML = '';
        const row = document.createElement('tr');
        row.innerHTML = '<td>Read 20 minutes</td><td colspan="7"><div class="day-grid"></div></td>';
        const dayGrid = row.querySelector('.day-grid');
        labels.forEach((label) => dayGrid.appendChild(label.cloneNode(true)));
        trackerBody.appendChild(row);
      }

      function attachCheckboxBehavior() {
        trackerBody.querySelectorAll('label.box').forEach((label) => {
          label.addEventListener('click', (event) => {
            event.preventDefault();
            label.classList.toggle('active');
            toggleCount += 1;
            renderPatterns();
          });
        });
      }

      addForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const name = habitInput.value.trim();
        if (!name) return;

        const row = document.createElement('tr');
        row.innerHTML = `<td>${name}</td><td colspan="7"></td>`;
        trackerBody.appendChild(row);
        habitInput.value = '';
      });

      document.addEventListener('DOMContentLoaded', () => {
        renderHabitRows();
        attachCheckboxBehavior();
        renderPatterns();
      });
    </script>
  </body>
</html>
