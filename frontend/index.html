<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <p class="eyebrow">WEEKLY TRACKING GRID</p>
        <h1>Habit Ledger</h1>
        <p class="sub">
          Check off each day as you go. The bar under each habit reads this week's completion; the status column reads the drift against last week's baseline.
        </p>
      </header>

      <div class="controls">
        <form class="add-row" id="add-form">
          <input type="text" id="habit-input" placeholder="Add a habit, e.g. Read 20 minutes" required maxlength="40" />
          <button type="submit">Add habit</button>
        </form>
        <button type="button" class="ghost" id="new-week-btn">Save week &amp; reset</button>
        <button type="button" class="ghost" id="undo-btn" disabled>Undo remove</button>
      </div>

      <div class="table-scroll">
        <table id="tracker">
          <thead>
            <tr>
              <th class="col-habit">Habit</th>
              <th>Sun</th>
              <th>Mon</th>
              <th>Tue</th>
              <th>Wed</th>
              <th>Thu</th>
              <th>Fri</th>
              <th>Sat</th>
              <th class="col-status">Status</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>

      <section class="patterns" id="patterns"></section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
